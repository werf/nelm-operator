apiVersion: nelm.werf.io/v1alpha1
kind: Release
metadata:
  name: podinfo
spec:
  chart:
    oci:
      layerSelector:
        mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
        operation: extract
      provider: generic
      semver: 6.7.1
      timeout: 60s
      url: oci://ghcr.io/stefanprodan/charts/podinfo
  interval: 1m
  targetNamespace: podinfo
  timeout: 30m
