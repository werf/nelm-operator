# Full Release example with all supported fields.
# Most fields are optional — see nelm_v1alpha1_release.yaml for a minimal example.
apiVersion: nelm.werf.io/v1alpha1
kind: Release
metadata:
  name: myapp
  namespace: production
spec:
  # --- Chart source (exactly one of chart or chartRef must be set) ---

  # Option 1: Inline chart source. Specify EXACTLY ONE of: repo | git | oci | bucket.
  chart:
    # repo: Helm Chart from a Helm repository (HTTP/S or OCI).
    repo:
      url: https://stefanprodan.github.io/podinfo  # ^(http|https|oci)://
      name: podinfo                 # chart name in the repository
      version: "6.7.1"              # semver expression; latest when omitted
      interval: 10m                 # repository poll interval (defaults to spec.interval)

    # git: Helm Chart from a Git repository.
    # git:
    #   url: https://github.com/stefanprodan/podinfo  # ^(http|https|ssh)://
    #   path: ./charts/podinfo      # path to the chart in the repo
    #   branch: master              # one of branch | tag | semver | commit | ref
    #   provider: generic           # generic | azure | github (default: generic)
    #   interval: 10m

    # oci: Helm Chart from an OCI registry.
    # oci:
    #   url: oci://ghcr.io/stefanprodan/charts/podinfo  # ^oci://
    #   tag: "6.7.1"                # one of tag | semver | digest
    #   provider: generic           # generic | aws | azure | gcp (default: generic)
    #   interval: 10m

    # bucket: Helm Chart from an S3-compatible bucket.
    # bucket:
    #   endpoint: minio.example.com # object storage address
    #   bucketName: charts          # bucket name
    #   path: ./podinfo             # path to the chart in the bucket
    #   provider: generic           # generic | aws | gcp | azure (default: generic)
    #   region: us-east-1           # optional
    #   interval: 10m               # required

  # Option 2: Reference to a pre-existing source object (mutually exclusive with chart).
  # chartRef:
  #   kind: HelmChart              # HelmChart | OCIRepository
  #   name: my-existing-chart
  #   namespace: flux-system       # optional, defaults to Release namespace

  # --- Target ---
  targetNamespace: myapp-prod       # namespace to deploy into (defaults to metadata.namespace)
  interval: 5m                      # drift reconciliation interval
  timeout: 30m                      # global timeout (overridable per action below)
  suspend: false                    # skip reconciliation when true

  # --- Values ---
  values:                           # inline values (any YAML)
    replicaCount: 3
    image:
      repository: myregistry.io/myapp
      tag: "2.1.0"
    ingress:
      enabled: true
      hosts:
        - host: myapp.example.com
          paths:
            - path: /
              pathType: Prefix

  valuesFrom:                       # values from ConfigMaps/Secrets (merged in order)
    - kind: ConfigMap
      name: myapp-values
      dataKey: values.yaml          # key in the ConfigMap/Secret data (default: values.yaml)
      optional: false               # fail if missing (default: false)
    - kind: Secret
      name: myapp-db-credentials
      dataKey: db-values.yaml
      optional: true                # skip silently if missing

  noDefaultValues: false            # disable chart's default values (default: false)

  setRootContextJSON:               # JSON patches applied to root values context
    - '{"global.environment": "production"}'

  # --- Secret values (encrypted) ---
  secretKeyFrom:                    # decryption key for encrypted values
    kind: Secret                    # always Secret
    name: myapp-secret-key
    dataKey: key                    # key in the Secret data (default: key)

  secretValuesFrom:                 # encrypted values files
    - kind: Secret
      name: myapp-encrypted-values
      dataKey: secret-values.yaml
      optional: false

  noDefaultSecretValues: false      # disable chart's default secret values (default: false)

  # --- Install/upgrade configuration ---
  install:
    timeout: 15m                    # overrides spec.timeout for install
    autoRollback: true              # rollback to previous revision on failure
    retries: 3                      # retry failed installs up to N times before stalling
    noInstallCRDs: false            # skip installing standalone CRDs from chart (default: false)
    deletePropagation: Background   # Background | Foreground | Orphan
    noForceAdoption: false          # disable adopting existing resources (default: false)
    noRemoveManualChanges: false    # preserve manual changes to managed resources (default: false)
    noDefaultDiffPatches: false       # ignore chart-shipped patches.yaml (spec.diffPatches still apply)
    templatesAllowDNS: false        # allow DNS lookups in chart templates

  # --- Rollback configuration ---
  rollback:
    timeout: 10m                    # overrides spec.timeout for rollback
    deletePropagation: Background
    noForceAdoption: false
    noRemoveManualChanges: false
    noDefaultDiffPatches: false       # ignore chart-shipped patches.yaml during rollback

  # --- Uninstall configuration ---
  uninstall:
    timeout: 10m                    # overrides spec.timeout for uninstall
    deleteNamespace: false          # delete the target namespace on uninstall
    deletePropagation: Background
    noRemoveManualChanges: false
    noDefaultDiffPatches: false       # ignore chart-shipped patches.yaml during uninstall

  # --- Resource labels and annotations ---
  extraAnnotations:                 # added to all deployed resources
    team: platform
  extraLabels:                      # added to all deployed resources
    app.kubernetes.io/part-of: myapp
  runtimeAnnotations:               # added at runtime (not stored in release)
    deploy.werf.io/trigger: "true"
  runtimeLabels:                    # added at runtime (not stored in release)
    deploy.werf.io/env: production
  releaseInfoAnnotations:           # added to the Helm release secret
    release-owner: platform-team
  releaseLabels:                    # added to the Helm release secret
    managed-by: nelm-operator
  appVersion: "2.1.0"              # override chart's appVersion

  # --- Diff patches (drift-detection only) ---
  # diffPatches ONLY affect drift detection during self-healing reconciliation:
  # the jq program is applied identically to the live and the desired object
  # before they are compared, so normalized-away fields never trigger a rollout.
  # They NEVER change what is rendered or applied to the cluster.
  diffPatches:
  - match:
      kinds: [Deployment]           # bare value = exact match
      names: ["/web-.*/"]           # /regex/ = anchored full-match regexp
      charts: [cache]               # matches the chart ALIAS, not the upstream name
      labels:                       # exact key=value, all must match
        tier: backend
    type: jq                        # only "jq" is supported (default)
    patch: |                        # jq sees raw K8s JSON, must return one object
      del(.spec.replicas)

  # --- Tracking ---
  tracking:
    readinessTimeout: 5m            # wait for resources to become ready
    creationTimeout: 3m             # wait for resources to be created
    deletionTimeout: 3m             # wait for resources to be deleted
    podLogs: false                  # stream pod logs during tracking (noisy in operator mode)
    finalTracking: false            # final tracking pass after install

  # --- Provenance ---
  provenance:
    strategy: never                 # never | digest | signature
    keyringFrom:                    # PGP keyring for signature verification
      kind: Secret
      name: chart-keyring
      dataKey: pubring.gpg

  # --- Release storage ---
  releaseStorage:
    historyLimit: 10                # max number of release revisions to keep

  # --- Resource validation (kubeconform) ---
  validation:
    noResourceValidation: false     # disable resource schema validation (default: false)
    noValuesSchemaValidation: false # disable validating values against values.schema.json (default: false)
    localOnly: false                # only use local schemas, no HTTP fetching
    kubeVersion: "1.31.0"           # Kubernetes version for schema validation (has a default)
    skip:                           # skip validation for specific resources
      - CustomThing
    schemas:                        # override default schema sources
      - https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/{{ .NormalizedKubeVersion }}/{{ .ResourceKind }}{{ .StrictSuffix }}.json
    extraSchemas:                   # additional schema sources (appended to defaults)
      - https://my-schemas.example.com/{{ .NormalizedKubeVersion }}/{{ .ResourceKind }}.json
    schemaCacheLifetime: 48h        # how long to cache downloaded schemas

  # --- TypeScript ---
  typescript:
    ignoreBundleJS: false           # ignore bundled JS in TypeScript chart templates
