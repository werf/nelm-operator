---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - create
  - delete
  - get
  - list
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
- apiGroups:
  - nelm.werf.io
  resources:
  - releases
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nelm.werf.io
  resources:
  - releases/finalizers
  verbs:
  - update
- apiGroups:
  - nelm.werf.io
  resources:
  - releases/status
  verbs:
  - get
  - patch
  - update
