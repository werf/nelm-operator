---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: releases.nelm.werf.io
spec:
  group: nelm.werf.io
  names:
    kind: Release
    listKind: ReleaseList
    plural: releases
    singular: release
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    - jsonPath: .status.revision
      name: Revision
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              appVersion:
                type: string
              chart:
                properties:
                  bucket:
                    description: BucketChartSource defines Helm Chart from S3 bucket.
                    properties:
                      bucketName:
                        description: BucketName is the name of the object storage
                          bucket.
                        type: string
                      certificateFrom:
                        description: |-
                          CertificateFrom can be given the name of a Secret containing
                          either or both of

                          - a PEM-encoded client certificate (`tls.crt`) and private
                          key (`tls.key`);
                          - a PEM-encoded CA certificate (`ca.crt`)

                          and whichever are supplied, will be used for connecting to the
                          bucket. The client cert and key are useful if you are
                          authenticating with a certificate; the CA cert is useful if
                          you are using a self-signed server certificate. The Secret must
                          be of type `Opaque` or `kubernetes.io/tls`.

                          This field is only supported for the `generic` provider.
                        properties:
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      credentialsFrom:
                        description: |-
                          CredentialsFrom specifies the Secret containing authentication credentials
                          for the Bucket.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      endpoint:
                        description: Endpoint is the object storage address the BucketName
                          is located at.
                        type: string
                      ignore:
                        description: |-
                          Ignore overrides the set of excluded patterns in the .sourceignore format
                          (which is the same as .gitignore). If not provided, a default will be used,
                          consult the documentation for your version to find out what those are.
                        type: string
                      ignoreMissingValuesFiles:
                        description: IgnoreMissingValuesFiles controls whether to
                          silently ignore missing values files rather than failing.
                        type: boolean
                      insecure:
                        description: Insecure allows connecting to a non-TLS HTTP
                          Endpoint.
                        type: boolean
                      interval:
                        description: |-
                          Interval at which the Bucket Endpoint is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      path:
                        description: Path specifies path to the Helm Chart in the
                          S3 bucket.
                        type: string
                      prefix:
                        description: Prefix to use for server-side filtering of files
                          in the Bucket.
                        type: string
                      provider:
                        default: generic
                        description: |-
                          Provider of the object storage bucket.
                          Defaults to 'generic', which expects an S3 (API) compatible object
                          storage.
                        enum:
                        - generic
                        - aws
                        - gcp
                        - azure
                        type: string
                      proxySettingsFrom:
                        description: |-
                          ProxySettingsFrom specifies the Secret containing the proxy configuration
                          to use while communicating with the Bucket server.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      reconcileStrategy:
                        default: ChartVersion
                        description: |-
                          ReconcileStrategy determines what enables the creation of a new artifact.
                          Valid values are ('ChartVersion', 'Revision').
                          See the documentation of the values for an explanation on their behavior.
                          Defaults to ChartVersion when omitted.
                        enum:
                        - ChartVersion
                        - Revision
                        type: string
                      region:
                        description: Region of the Endpoint where the BucketName is
                          located in.
                        type: string
                      serviceAccountName:
                        description: |-
                          ServiceAccountName is the name of the Kubernetes ServiceAccount used to authenticate
                          the bucket. This field is only supported for the 'gcp' and 'aws' providers.
                          For more information about workload identity:
                          https://fluxcd.io/flux/components/source/buckets/#workload-identity
                        type: string
                      sts:
                        description: |-
                          STS specifies the required configuration to use a Security Token
                          Service for fetching temporary credentials to authenticate in a
                          Bucket provider.

                          This field is only supported for the `aws` and `generic` providers.
                        properties:
                          certSecretRef:
                            description: |-
                              CertSecretRef can be given the name of a Secret containing
                              either or both of

                              - a PEM-encoded client certificate (`tls.crt`) and private
                              key (`tls.key`);
                              - a PEM-encoded CA certificate (`ca.crt`)

                              and whichever are supplied, will be used for connecting to the
                              STS endpoint. The client cert and key are useful if you are
                              authenticating with a certificate; the CA cert is useful if
                              you are using a self-signed server certificate. The Secret must
                              be of type `Opaque` or `kubernetes.io/tls`.

                              This field is only supported for the `ldap` provider.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                          endpoint:
                            description: |-
                              Endpoint is the HTTP/S endpoint of the Security Token Service from
                              where temporary credentials will be fetched.
                            pattern: ^(http|https)://.*$
                            type: string
                          provider:
                            description: Provider of the Security Token Service.
                            enum:
                            - aws
                            - ldap
                            type: string
                          secretRef:
                            description: |-
                              SecretRef specifies the Secret containing authentication credentials
                              for the STS endpoint. This Secret must contain the fields `username`
                              and `password` and is supported only for the `ldap` provider.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - endpoint
                        - provider
                        type: object
                      timeout:
                        default: 60s
                        description: Timeout for fetch operations, defaults to 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      valuesFiles:
                        description: |-
                          Alternative list of values files to use as the chart values (values.yaml
                          is not included by default), expected to be a relative path in the SourceRef.
                          Values files are merged in the order of this list with the last file overriding
                          the first. Ignored when omitted.
                        items:
                          type: string
                        type: array
                    required:
                    - bucketName
                    - endpoint
                    - interval
                    - path
                    type: object
                  git:
                    description: GitRepositoryChartSource defines Helm Chart from
                      Git repository.
                    properties:
                      Submodules:
                        description: |-
                          Submodules enables the initialization of all submodules within
                          the GitRepository as cloned from the URL, using their default settings.
                        type: boolean
                      branch:
                        description: Branch to check out, defaults to 'master' if
                          no other field is defined.
                        type: string
                      commit:
                        description: |-
                          Commit SHA to check out, takes precedence over all reference fields.

                          This can be combined with Branch to shallow clone the branch, in which
                          the commit is expected to exist.
                        type: string
                      credentialsFrom:
                        description: |-
                          CredentialsFrom specifies the Secret containing authentication credentials for
                          the GitRepository.
                          For HTTPS repositories the Secret must contain 'username' and 'password'
                          fields for basic auth or 'bearerToken' field for token auth.
                          For SSH repositories the Secret must contain 'identity'
                          and 'known_hosts' fields.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      ignore:
                        description: |-
                          Ignore overrides the set of excluded patterns in the .sourceignore format
                          (which is the same as .gitignore). If not provided, a default will be used,
                          consult the documentation for your version to find out what those are.
                        type: string
                      ignoreMissingValuesFiles:
                        description: IgnoreMissingValuesFiles controls whether to
                          silently ignore missing values files rather than failing.
                        type: boolean
                      include:
                        description: |-
                          Include specifies a list of GitRepository resources which Artifacts
                          should be included in the Artifact produced for this GitRepository.
                        items:
                          description: |-
                            GitRepositoryInclude specifies a local reference to a GitRepository which
                            Artifact (sub-)contents must be included, and where they should be placed.
                          properties:
                            fromPath:
                              description: |-
                                FromPath specifies the path to copy contents from, defaults to the root
                                of the Artifact.
                              type: string
                            repository:
                              description: |-
                                GitRepositoryRef specifies the GitRepository which Artifact contents
                                must be included.
                              properties:
                                name:
                                  description: Name of the referent.
                                  type: string
                              required:
                              - name
                              type: object
                            toPath:
                              description: |-
                                ToPath specifies the path to copy contents to, defaults to the name of
                                the GitRepositoryRef.
                              type: string
                          required:
                          - repository
                          type: object
                        type: array
                      interval:
                        description: |-
                          Interval at which the GitRepository URL is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      path:
                        description: Path specifies path to the Helm Chart in the
                          Git repository.
                        type: string
                      provider:
                        description: |-
                          Provider used for authentication, can be 'azure', 'github', 'generic'.
                          When not specified, defaults to 'generic'.
                        enum:
                        - generic
                        - azure
                        - github
                        type: string
                      proxySettingsFrom:
                        description: |-
                          ProxySettingsFrom specifies the Secret containing the proxy configuration
                          to use while communicating with the Git server.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      reconcileStrategy:
                        default: ChartVersion
                        description: |-
                          ReconcileStrategy determines what enables the creation of a new artifact.
                          Valid values are ('ChartVersion', 'Revision').
                          See the documentation of the values for an explanation on their behavior.
                          Defaults to ChartVersion when omitted.
                        enum:
                        - ChartVersion
                        - Revision
                        type: string
                      ref:
                        description: |-
                          Reference is the reference to check out; takes precedence over Branch, Tag and SemVer.

                          It must be a valid Git reference: https://git-scm.com/docs/git-check-ref-format#_description
                          Examples: "refs/heads/main", "refs/tags/v0.1.0", "refs/pull/420/head", "refs/merge-requests/1/head"
                        type: string
                      semver:
                        description: SemVer tag expression to check out, takes precedence
                          over Tag.
                        type: string
                      serviceAccountName:
                        description: |-
                          ServiceAccountName is the name of the Kubernetes ServiceAccount used to
                          authenticate to the GitRepository. This field is only supported for 'azure' and 'aws' providers.
                        type: string
                      sparseCheckout:
                        description: |-
                          SparseCheckout specifies a list of directories to checkout when cloning
                          the repository. If specified, only these directories are included in the
                          Artifact produced for this GitRepository.
                        items:
                          type: string
                        type: array
                      tag:
                        description: Tag to check out, takes precedence over Branch.
                        type: string
                      timeout:
                        default: 60s
                        description: Timeout for Git operations like cloning, defaults
                          to 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      url:
                        description: URL specifies the Git repository URL, it can
                          be an HTTP/S or SSH address.
                        pattern: ^(http|https|ssh)://.*$
                        type: string
                      valuesFiles:
                        description: |-
                          Alternative list of values files to use as the chart values (values.yaml
                          is not included by default), expected to be a relative path in the SourceRef.
                          Values files are merged in the order of this list with the last file overriding
                          the first. Ignored when omitted.
                        items:
                          type: string
                        type: array
                      verify:
                        description: |-
                          Verification specifies the configuration to verify the Git commit
                          signature(s).
                        properties:
                          mode:
                            default: HEAD
                            description: |-
                              Mode specifies which Git object(s) should be verified.

                              The variants "head" and "HEAD" both imply the same thing, i.e. verify
                              the commit that the HEAD of the Git repository points to. The variant
                              "head" solely exists to ensure backwards compatibility.
                            enum:
                            - head
                            - HEAD
                            - Tag
                            - TagAndHEAD
                            type: string
                          secretRef:
                            description: |-
                              SecretRef specifies the Secret containing the public keys of trusted Git
                              authors.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - secretRef
                        type: object
                    required:
                    - path
                    - url
                    type: object
                  oci:
                    description: OCIRepositoryChartSource defines Helm Chart from
                      OCI repository/registry.
                    properties:
                      certificateFrom:
                        description: |-
                          CertificateFrom can be given the name of a Secret containing
                          either or both of

                          - a PEM-encoded client certificate (`tls.crt`) and private
                          key (`tls.key`);
                          - a PEM-encoded CA certificate (`ca.crt`)

                          and whichever are supplied, will be used for connecting to the
                          registry. The client cert and key are useful if you are
                          authenticating with a certificate; the CA cert is useful if
                          you are using a self-signed server certificate. The Secret must
                          be of type `Opaque` or `kubernetes.io/tls`.
                        properties:
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      credentialsFrom:
                        description: |-
                          CredentialsFrom contains the secret name containing the registry login
                          credentials to resolve image metadata.
                          The secret must be of type kubernetes.io/dockerconfigjson.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      digest:
                        description: |-
                          Digest is the image digest to pull, takes precedence over SemVer.
                          The value should be in the format 'sha256:<HASH>'.
                        type: string
                      ignore:
                        description: |-
                          Ignore overrides the set of excluded patterns in the .sourceignore format
                          (which is the same as .gitignore). If not provided, a default will be used,
                          consult the documentation for your version to find out what those are.
                        type: string
                      insecure:
                        description: Insecure allows connecting to a non-TLS HTTP
                          container registry.
                        type: boolean
                      interval:
                        description: |-
                          Interval at which the OCIRepository URL is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      layerSelector:
                        description: |-
                          LayerSelector specifies which layer should be extracted from the OCI artifact.
                          When not specified, the first layer found in the artifact is selected.
                        properties:
                          mediaType:
                            description: |-
                              MediaType specifies the OCI media type of the layer
                              which should be extracted from the OCI Artifact. The
                              first layer matching this type is selected.
                            type: string
                          operation:
                            description: |-
                              Operation specifies how the selected layer should be processed.
                              By default, the layer compressed content is extracted to storage.
                              When the operation is set to 'copy', the layer compressed content
                              is persisted to storage as it is.
                            enum:
                            - extract
                            - copy
                            type: string
                        type: object
                      provider:
                        default: generic
                        description: |-
                          The provider used for authentication, can be 'aws', 'azure', 'gcp' or 'generic'.
                          When not specified, defaults to 'generic'.
                        enum:
                        - generic
                        - aws
                        - azure
                        - gcp
                        type: string
                      proxySettingsFrom:
                        description: |-
                          ProxySettingsFrom specifies the Secret containing the proxy configuration
                          to use while communicating with the container registry.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      semver:
                        description: |-
                          SemVer is the range of tags to pull selecting the latest within
                          the range, takes precedence over Tag.
                        type: string
                      semverFilter:
                        description: SemverFilter is a regex pattern to filter the
                          tags within the SemVer range.
                        type: string
                      serviceAccountName:
                        description: |-
                          ServiceAccountName is the name of the Kubernetes ServiceAccount used to authenticate
                          the image pull if the service account has attached pull secrets. For more information:
                          https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#add-imagepullsecrets-to-a-service-account
                        type: string
                      tag:
                        description: Tag is the image tag to pull, defaults to latest.
                        type: string
                      timeout:
                        default: 60s
                        description: The timeout for remote OCI Repository operations
                          like pulling, defaults to 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      url:
                        description: |-
                          URL is a reference to an OCI artifact repository hosted
                          on a remote container registry.
                        pattern: ^oci://.*$
                        type: string
                      verify:
                        description: |-
                          Verify contains the secret name containing the trusted public keys
                          used to verify the signature and specifies which provider to use to check
                          whether OCI image is authentic.
                        properties:
                          matchOIDCIdentity:
                            description: |-
                              MatchOIDCIdentity specifies the identity matching criteria to use
                              while verifying an OCI artifact which was signed using Cosign keyless
                              signing. The artifact's identity is deemed to be verified if any of the
                              specified matchers match against the identity.
                            items:
                              description: |-
                                OIDCIdentityMatch specifies options for verifying the certificate identity,
                                i.e. the issuer and the subject of the certificate.
                              properties:
                                issuer:
                                  description: |-
                                    Issuer specifies the regex pattern to match against to verify
                                    the OIDC issuer in the Fulcio certificate. The pattern must be a
                                    valid Go regular expression.
                                  type: string
                                subject:
                                  description: |-
                                    Subject specifies the regex pattern to match against to verify
                                    the identity subject in the Fulcio certificate. The pattern must
                                    be a valid Go regular expression.
                                  type: string
                              required:
                              - issuer
                              - subject
                              type: object
                            type: array
                          provider:
                            default: cosign
                            description: Provider specifies the technology used to
                              sign the OCI Artifact.
                            enum:
                            - cosign
                            - notation
                            type: string
                          secretRef:
                            description: |-
                              SecretRef specifies the Kubernetes Secret containing the
                              trusted public keys.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - provider
                        type: object
                    required:
                    - url
                    type: object
                  repo:
                    description: HelmRepositoryChartSource defines Helm Chart from
                      Helm repository.
                    properties:
                      certificateFrom:
                        description: |-
                          CertificateFrom can be given the name of a Secret containing
                          either or both of

                          - a PEM-encoded client certificate (`tls.crt`) and private
                          key (`tls.key`);
                          - a PEM-encoded CA certificate (`ca.crt`)

                          and whichever are supplied, will be used for connecting to the
                          registry. The client cert and key are useful if you are
                          authenticating with a certificate; the CA cert is useful if
                          you are using a self-signed server certificate. The Secret must
                          be of type `Opaque` or `kubernetes.io/tls`.

                          It takes precedence over the values specified in the Secret referred
                          to by `.spec.secretRef`.
                        properties:
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      credentialsFrom:
                        description: |-
                          CredentialsFrom specifies the Secret containing authentication credentials
                          for the HelmRepository.
                          For HTTP/S basic auth the secret must contain 'username' and 'password'
                          fields.
                          Support for TLS auth using the 'certFile' and 'keyFile', and/or 'caFile'
                          keys is deprecated. Please use `.spec.certSecretRef` instead.
                        properties:
                          kind:
                            default: Secret
                            enum:
                            - Secret
                            type: string
                          name:
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      ignoreMissingValuesFiles:
                        description: IgnoreMissingValuesFiles controls whether to
                          silently ignore missing values files rather than failing.
                        type: boolean
                      insecure:
                        description: |-
                          Insecure allows connecting to a non-TLS HTTP container registry.
                          This field is only taken into account if the .spec.type field is set to 'oci'.
                        type: boolean
                      interval:
                        description: |-
                          Interval at which the HelmRepository URL is checked for updates.
                          This interval is approximate and may be subject to jitter to ensure
                          efficient use of resources.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                        type: string
                      name:
                        description: Name is the name of the Helm Chart in the specified
                          Helm Repository.
                        type: string
                      passCredentials:
                        description: |-
                          PassCredentials allows the credentials from the SecretRef to be passed
                          on to a host that does not match the host as defined in URL.
                          This may be required if the host of the advertised chart URLs in the
                          index differ from the defined URL.
                          Enabling this should be done with caution, as it can potentially result
                          in credentials getting stolen in a MITM-attack.
                        type: boolean
                      timeout:
                        description: |-
                          Timeout is used for the index fetch operation for an HTTPS helm repository,
                          and for remote OCI Repository operations like pulling for an OCI helm
                          chart by the associated HelmChart.
                          Its default value is 60s.
                        pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m))+$
                        type: string
                      url:
                        description: |-
                          URL of the Helm repository, a valid URL contains at least a protocol and
                          host.
                        pattern: ^(http|https|oci)://.*$
                        type: string
                      valuesFiles:
                        description: |-
                          Alternative list of values files to use as the chart values (values.yaml
                          is not included by default), expected to be a relative path in the SourceRef.
                          Values files are merged in the order of this list with the last file overriding
                          the first. Ignored when omitted.
                        items:
                          type: string
                        type: array
                      verify:
                        description: |-
                          Verify contains the secret name containing the trusted public keys
                          used to verify the signature and specifies which provider to use to check
                          whether OCI image is authentic.
                          This field is only supported when using HelmRepository source with spec.type 'oci'.
                          Chart dependencies, which are not bundled in the umbrella chart artifact, are not verified.
                        properties:
                          matchOIDCIdentity:
                            description: |-
                              MatchOIDCIdentity specifies the identity matching criteria to use
                              while verifying an OCI artifact which was signed using Cosign keyless
                              signing. The artifact's identity is deemed to be verified if any of the
                              specified matchers match against the identity.
                            items:
                              description: |-
                                OIDCIdentityMatch specifies options for verifying the certificate identity,
                                i.e. the issuer and the subject of the certificate.
                              properties:
                                issuer:
                                  description: |-
                                    Issuer specifies the regex pattern to match against to verify
                                    the OIDC issuer in the Fulcio certificate. The pattern must be a
                                    valid Go regular expression.
                                  type: string
                                subject:
                                  description: |-
                                    Subject specifies the regex pattern to match against to verify
                                    the identity subject in the Fulcio certificate. The pattern must
                                    be a valid Go regular expression.
                                  type: string
                              required:
                              - issuer
                              - subject
                              type: object
                            type: array
                          provider:
                            default: cosign
                            description: Provider specifies the technology used to
                              sign the OCI Artifact.
                            enum:
                            - cosign
                            - notation
                            type: string
                          secretRef:
                            description: |-
                              SecretRef specifies the Kubernetes Secret containing the
                              trusted public keys.
                            properties:
                              name:
