# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/fluxcd/source-controller
  pullPolicy: IfNotPresent
  tag: v1.8.5

podAnnotations:
  prometheus.io/port: "8080"
  prometheus.io/scrape: "true"

podLabels: {}

podSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  fsGroup: 1337

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 50m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: healthz

readinessProbe:
  httpGet:
    path: /
    port: http

volumes:
  - emptyDir: {}
    name: data
  - emptyDir: {}
    name: tmp

volumeMounts:
  - mountPath: /data
    name: data
  - mountPath: /tmp
    name: tmp

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

prometheus:
  podMonitor:
    create: false
