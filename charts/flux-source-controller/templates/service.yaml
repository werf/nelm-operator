---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fluxcd-source-controller.fullname" . }}
  labels: {{- include "fluxcd-source-controller.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    {{- include "fluxcd-source-controller.selectorLabels" . | nindent 4 }}
  type: ClusterIP
