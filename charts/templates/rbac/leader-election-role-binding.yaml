apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "nelm-helm-controller.labels" . | nindent 4 }}
  name: {{ include "nelm-operator.fullname" . }}-leader-election-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nelm-operator.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nelm-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
