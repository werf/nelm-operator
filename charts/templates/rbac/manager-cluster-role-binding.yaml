apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "nelm-operator.labels" . | nindent 4 }}
  name: {{ include "nelm-operator.fullname" . }}-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nelm-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "nelm-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "nelm-helm-controller.labels" . | nindent 4 }}
  name: {{ include "nelm-operator.fullname" . }}-reconciler-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nelm-operator.fullname" . }}-reconciler-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nelm-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
