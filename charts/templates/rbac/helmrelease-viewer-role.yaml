# permissions for end users to view helmreleases.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "nelm-helm-controller.labels" . | nindent 4 }}
  name: {{ include "nelm-operator.fullname" . }}-helmrelease-viewer-role
rules:
- apiGroups:
  - helm.werf.io
  resources:
  - helmreleases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - helm.werf.io
  resources:
  - helmreleases/status
  verbs:
  - get
