---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nelm-operator.fullname" . }}-source-controller
  labels:
    {{- include "nelm-source-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.sourceController.replicaCount }}
  selector:
    matchLabels:
      {{- include "nelm-source-controller.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      {{- with .Values.sourceController.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nelm-source-controller.labels" . | nindent 8 }}
        {{- with .Values.sourceController.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      serviceAccountName: {{ include "nelm-operator.serviceAccountName" . }}
      containers:
      - args:
        - --watch-all-namespaces
        - --log-level=info
        - --log-encoding=json
        - --enable-leader-election
        - --storage-path=/data
        - --storage-adv-addr={{ include "nelm-operator.fullname" . }}-source-controller.$(RUNTIME_NAMESPACE).svc.cluster.local.
        env:
        - name: RUNTIME_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TUF_ROOT
          value: /tmp/.sigstore
        image: "{{ .Values.sourceController.image.repository }}:{{ .Values.sourceController.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.sourceController.image.pullPolicy }}
        livenessProbe:
          {{- toYaml .Values.sourceController.livenessProbe | nindent 10 }}
        name: manager
        ports:
        - containerPort: 9090
          name: http
          protocol: TCP
        - containerPort: 8080
          name: http-prom
          protocol: TCP
        - containerPort: 9440
          name: healthz
          protocol: TCP
        readinessProbe:
          {{- toYaml .Values.sourceController.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.sourceController.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.sourceController.podSecurityContext | nindent 10 }}
        {{- with .Values.sourceController.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      securityContext:
        {{- toYaml .Values.sourceController.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.sourceController.volumes }}
      volumes:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.sourceController.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sourceController.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sourceController.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nelm-operator.fullname" . }}-helm-controller
  labels:
    {{- include "nelm-helm-controller.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nelm-helm-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.helmController.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nelm-helm-controller.labels" . | nindent 8 }}
        {{- with .Values.helmController.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nelm-operator.serviceAccountName" . }}
      containers:
      - args:
        - --watch-all-namespaces
        - --log-level=info
        - --log-encoding=json
        - --enable-leader-election
        env:
        - name: RUNTIME_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: "{{ .Values.helmController.image.repository }}:{{ .Values.helmController.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.helmController.image.pullPolicy }}
        livenessProbe:
          {{- toYaml .Values.helmController.livenessProbe | nindent 10 }}
        name: manager
        ports:
        - containerPort: 8080
          name: http-prom
          protocol: TCP
        - containerPort: 9440
          name: healthz
          protocol: TCP
        readinessProbe:
          {{- toYaml .Values.helmController.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.helmController.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.helmController.podSecurityContext | nindent 10 }}
        {{- with .Values.helmController.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      securityContext:
        {{- toYaml .Values.helmController.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 600
      {{- with .Values.helmController.volumes }}
      volumes:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.sourceController.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sourceController.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sourceController.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
