---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nelm-operator.fullname" . }}-source-controller
  labels: {{- include "nelm-operator.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    {{- include "nelm-source-controller.selectorLabels" . | nindent 4 }}
  type: ClusterIP
